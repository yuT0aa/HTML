<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style type="text/css">
            body{
                background-color: rgb(234, 231, 233);
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: 18px;
                color: rgb(0, 0, 0);
            }
            .container>ul{
                display: flex;
                justify-content: left;
                list-style-type: none;
                gap: 78px;
            }
            .container>ul li:hover{
                    text-align: center;
                    text-decoration: underline;
            }
            .class{
                margin-top: 50px;
                padding: 20px;
                border-radius: 10px;
            }
            .class{
                display: flex;
                justify-content: space-around;
                gap: 10px;
            }
            .item{
                display: flex;
                flex-direction: row;
                background-color: rgb(124, 124, 124);
                padding: 10px;
                border-radius: 10px;
                width: 30%;
                color: white;
                align-items: center;
                gap: 10px;
            }
            .item li{
                list-style-type: none;
                margin-left: 10px;
            }
            .item figure{
                margin: 0;        
            }
        </style>
    </head>
    <body>
        <h1>Best Tools & Utilities Software</h1>
        <div class="container">
            <ul>
                <li>Windows</li>
                <li>Mac</li>
                <li>Android</li>
                <li>iOS</li>
            </ul>
        </div>
        <div class="class">
            <div class="item"> 
            <figure><img src="https://cdn-icons-png.flaticon.com/128/503/503819.png"width="50px"></figure>

            </div>
            <div class="item">
            <figure><img src="https://cdn-icons-png.flaticon.com/128/2516/2516753.png"width="50px"></figure>
                <li>Lorem ipsum dolor sit amet consectetur adipisicing elit.</li>
            </div>
            <div class="item">
                <figure><img src="https://cdn-icons-png.flaticon.com/128/15254/15254555.png"width="50px"></figure>
                <li>Lorem ipsum dolor sit amet consectetur adipisicing elit.</li>    
            </div>
        </div>
    </body>
</html>
