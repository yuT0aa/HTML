<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}
body {
  background: #ffffff;
  padding: 40px;
}
.container {
  max-width: 1200px;
  margin: auto;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}
.header h1 {
  font-size: 28px;
  letter-spacing: 1px;
  font-family:  sans-serif;
}
.cart {
  position: relative;
  font-size: 26px;
  cursor: pointer;
}
.cart span {
  position: absolute;
  top: -8px;
  right: -10px;
  background: red;
  color: rgb(255, 255, 255);
  font-size: 12px;
  padding: 3px 6px;
  border-radius: 50%;
  font-weight: bold;
}
.cart:hover{
  background: rgb(30, 28, 28);
    color: white;
    border-radius: 50%;
}
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 25px;
}
.card {
  background: #ecebe6;
  border-radius: 18px;
  padding: 20px;
  text-align: center;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card img {
  width: 100%;
  max-height: 180px;
  object-fit: contain;
  margin-bottom: 15px;
}
.card h3 {
  font-size: 14px;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.price {
  font-weight: bold;
  margin-bottom: 12px;
}
button {
  background: #222;
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.3s ease;
}
button:hover {
  background: #444;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>PRODUCT LIST</h1>
    <div class="cart">🛒<span>0</span></div>
  </div>
  <div class="products">
    <div class="card">
      <img src="https://dm4c9mjc2jvtf.cloudfront.net/product-media/2283/1200/900/gubi-c-chair-chair-black-stained-oak.jpg">
      <h3>LD01 LOUNGE CHAIR</h3>
      <div class="price">$200</div>
      <button>Add To Cart</button>
    </div>
    <div class="card">
      <img src="https://tse1.mm.bing.net/th/id/OIP.YD0H8-SU7srIGmhBarUgygHaNS?pid=ImgDet&w=187&h=335&c=7&o=7&rm=3">
      <h3>LD02 LOUNGE CHAIR</h3>
      <div class="price">$250</div>
      <button>Add To Cart</button>
    </div>
    <div class="card">
      <img src="https://tse2.mm.bing.net/th/id/OIP.m5ttG6mXoTSV3fs6tOweIwHaHa?pid=ImgDet&w=195&h=195&c=7&o=7&rm=3">
      <h3>LD03 LOUNGE CHAIR</h3>
      <div class="price">$200</div>
      <button>Add To Cart</button>
    </div>
    <div class="card">
      <img src="https://tse3.mm.bing.net/th/id/OIP.-pGNv0MWwqiutTKZiaIqHQAAAA?pid=ImgDet&w=192&h=305&c=7&o=7&rm=3">
      <h3>LD04 LOUNGE CHAIR</h3>
      <div class="price">$200</div>
      <button>Add To Cart</button>
    </div>
    <div class="card">
      <img src="https://tse2.mm.bing.net/th/id/OIP.F-QM7ab2p5-RCRSx7B6gcgHaHa?pid=ImgDet&w=192&h=192&c=7&o=7&rm=3">
      <h3>LD05 LOUNGE CHAIR</h3>
      <div class="price">$300</div>
      <button>Add To Cart</button>
    </div>
    <div class="card">
      <img src="https://tse1.mm.bing.net/th/id/OIP.ZirnHm4_LAC1da1XkT-AzAHaIx?pid=ImgDet&w=192&h=227&c=7&o=7&rm=3">
      <h3>LD06 LOUNGE CHAIR</h3>
      <div class="price">$200</div>
      <button>Add To Cart</button>
    </div>
  </div>
</div>
</body>
</html>
