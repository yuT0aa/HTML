<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tastalicious</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", Arial, sans-serif;
}

body{
  background:#fff;
  color:#222;
  overflow-x:hidden;
}

/* ===== ANIMATIONS ===== */
.fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* ===== HEADER ===== */
header{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 70px;
  animation:fadeUp 0.8s ease forwards;
}

.logo{
  font-size:22px;
  font-weight:700;
  color:#b400ff;
}

nav a{
  margin:0 18px;
  text-decoration:none;
  color:#444;
  transition:color .3s;
}

nav a:hover{
  color:#b400ff;
}

.cart{
  font-size:22px;
  color:#b400ff;
}

/* ===== CATEGORIES ===== */
.categories{
  display:flex;
  gap:25px;
  padding:20px 70px;
  animation:fadeUp 1s ease forwards;
}

.category{
  width:110px;
  height:80px;
  border-radius:14px;
  background:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-size:14px;
  transition:.3s;
}

.category:hover{
  transform:translateY(-8px);
  box-shadow:0 18px 35px rgba(180,0,255,0.25);
}

.category.active{
  background:#f4e6ff;
  color:#b400ff;
}

/* ===== MENU TITLE ===== */
.menu-title{
  display:flex;
  align-items:center;
  gap:10px;
  padding:30px 70px 10px;
  font-size:22px;
  font-weight:600;
  animation:fadeUp 1.2s ease forwards;
}

.menu-dot{
  width:10px;
  height:10px;
  background:#b400ff;
  border-radius:50%;
}

/* ===== PRODUCTS ===== */
.products{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:30px;
  padding:30px 70px 70px;
}

.card{
  background:#fff;
  border-radius:22px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
  padding:25px 15px;
  text-align:center;
  animation:fadeUp 1.4s ease forwards;
  transition:.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 45px rgba(180,0,255,0.3);
}

.card img{
  width:110px;
  margin-bottom:15px;
  transition:.3s;
}

.card:hover img{
  transform:scale(1.1);
}

.card h3{
  font-size:15px;
  margin-bottom:5px;
}

.card p{
  color:#666;
  margin-bottom:12px;
}

/* ===== BUTTON ===== */
.order{
  display:inline-block;
  padding:7px 22px;
  background:#b400ff;
  color:#fff;
  border-radius:18px;
  text-decoration:none;
  font-size:13px;
  transition:.3s;
}

.order:hover{
  animation:pulse .6s ease;
}

/* ===== RESPONSIVE ===== */
@media(max-width:1100px){
  .products{
    grid-template-columns:repeat(3,1fr);
  }
}

@media(max-width:700px){
  header{
    flex-direction:column;
    gap:15px;
  }

  .categories{
    flex-wrap:wrap;
    justify-content:center;
  }

  .products{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">🍰 Tastalicious</div>

  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">About</a>
    <a href="#">Services</a>
  </nav>

  <div class="cart">🛍️</div>
</header>

<div class="categories">
  <div class="category active">🍱 All</div>
  <div class="category">🍟 Fries</div>
  <div class="category">🍔 Burger</div>
  <div class="category">🍗 Chicken</div>
  <div class="category">🥗 Salad</div>
  <div class="category">🥤 Milkshake</div>
  <div class="category">🍨 Icecream</div>
  <div class="category">🥤 Drinks</div>
</div>

<div class="menu-title">
  <div class="menu-dot"></div> Menu
</div>

<div class="products">

  <div class="card">
    <img src="https://i.imgur.com/9Qx7F5U.png">
    <h3>Freddies Fries</h3>
    <p>$4.99</p>
    <a class="order" href="#">Order</a>
  </div>

  <div class="card">
    <img src="https://i.imgur.com/2yaf2wb.png">
    <h3>Milky Milkshake</h3>
    <p>$9.99</p>
    <a class="order" href="#">Order</a>
  </div>

  <div class="card">
    <img src="https://i.imgur.com/0umadnY.png">
    <h3>Franky Chicken</h3>
    <p>$8.00</p>
    <a class="order" href="#">Order</a>
  </div>

  <div class="card">
    <img src="https://i.imgur.com/8UQ4F6F.png">
    <h3>Benjamin Burger</h3>
    <p>$12.99</p>
    <a class="order" href="#">Order</a>
  </div>

  <div class="card">
    <img src="https://i.imgur.com/W1V8J8R.png">
    <h3>Choco Icecream</h3>
    <p>$14.99</p>
    <a class="order" href="#">Order</a>
  </div>

</div>

</body>
</html>
