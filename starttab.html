<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Website</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}
body {
  background-color: #4a1d1d;
  color: white;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 80px;
}
.logo {
  font-size: 26px;
  font-weight: bold;
}
nav a {
  color: white;
  text-decoration: none;
  margin-left: 25px;
}
nav a:hover {
  color: #f4a261;
}
.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 20px;
  min-height: 85vh;
}
.hero-text {
  max-width: 520px;
}
.hero-text .tag {
  color: #f4a261;
  font-size: 10px;
  font-weight: bold;
}
.hero-text h1 {
  font-size: 44px;
  margin: 15px 0;
  line-height: 1.3;
}
.hero-text p {
  color: #e8dcdc; 
  margin-bottom: 30px;
  line-height: 1.6;
}
.buttons {
  display: flex;
  gap: 15px;
}
.btn-primary {
  background: #f4a261;
  color: black;
  padding: 14px 28px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
}
.btn-secondary {
  border: 2px solid white;
  color: white;
  padding: 14px 28px;
  border-radius: 30px;
  text-decoration: none;
}
.btn-secondary:hover {
    background-color: white;
    color: black;
}
.hero-image img {
  width: 450px;
}
</style>
</head>
<body>
  <header>
    <div class="logo">Coffee</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Menu</a>
      <a href="#">Contact</a>
    </nav>
  </header>
  <main>
    <section class="hero">
      <div class="hero-text">
        <div class="tag">It's time to wake up</div>
        <h1>It's time to wake up</h1>
        <p>Start your day with a fresh and energizing cup of coffee. Discover our variety of blends and flavors crafted to perfection.</p>
        <div class="buttons">
          <a href="#" class="btn-primary">Order Now</a>
          <a href="#" class="btn-secondary">Learn More</a>
        </div>
      </div>
      <div class="hero-image">
       <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348" alt="Coffee Cup">
      </div>
    </section>
  </main>
