<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style type="text/css">
        
    </style>
</head>
<body>
    <fieldset >
        <legend>Formulaire de demande de passeport</legend>
            <form action="" class="was-validated">
                <th>
                    <label>N° CIN:</label> <input  type="text" name="CIN" pattern="^[A-Z]{2}[0-9]{5,6}$" required placeholder="Saisir votre N° CIN">
                    <div class="valid-feedback">Valide</div><div class="invalid-feedback">Invalide</div>
                    <br>
                    <label>Nom : <input type="text" name="Nom" pattern="^[A-Z\s]$" required placeholder="Saisir votre Nom">
                    <div class="valid-feedback">Valide</div><div class="invalid-feedback">Invalide</div></label>
                    <label>Prénom : <input type="text" name="Prénom" pattern="^[A-Z\s]$" required placeholder="Saisir votre Prénom">
                    <div class="valid-feedback">Valide</div><div class="invalid-feedback">Invalide</div></label> 
                    <label>Date de naissance : <input type="text" placeholder="Jour(JJ)" pattern="0[1-9]|1[0-9]|2[0-9]|3[0-1]" required><input type="text" placeholder="Mois(MM)" pattern="0[1-9]|1[0-2]" required><input type="text" placeholder="Année(YYYY)" pattern="[1-2][0-9]{4}" required>
                    <div class="valid-feedback">Valide</div><div class="invalid-feedback">Invalide</div></label>
                    <label>Genre : <input type="radio" name="genre" value="Masculin">Masculin<input type="radio" name="genre" value="Feminin">Feminin
                    <div class="valid-feedback">Valide</div><div class="invalid-feedback">Invalide</div></label>
                    <label>Lieu de naissance : <input type="text" name="Lieu de naissance" pattern="^[A-Z\s]$" required placeholder="Saisir votre Lieu de naissance">
                    <div class="valid-feedback">Valide</div><div class="invalid-feedback">Invalide</div></label>
                    <label>Pays de naissance : <select name="Pays de naissance">
                        <option value="Maroc">Maroc</option>
                        <option value="France">France</option>
                        <option value="Espagne">Espagne</option>
                    </select>
                    <div class="valid-feedback">Valide</div><div class="invalid-feedback">Invalide</div></label>
                    <label>Numero de telephone: +212 <input type="text" name="Numero de telephone" pattern="^[0-9]{8}$" placeholder="0600-000000">
                    <div class="valid-feedback">Valide</div><div class="invalid-feedback">Invalide</div></label>
                    <label>Photo de Carte d'identité : <input type="file" name="Photo de Carte d'identité">
                    <div class="valid-feedback">Valide</div><div class="invalid-feedback">Invalide</div></label>
                    <button type="submit">Valider</button>
                    <button type="reset">Annuler</button>
                </th>
            </form>
    </fieldset>
</body>

</html>
